name: Update GitHub Code Stats

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0"   # every Sunday midnight UTC

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout profile repo
        uses: actions/checkout@v4

      - name: Install cloc
        run: sudo apt-get update && sudo apt-get install -y cloc

      - name: Clone all repos and count code
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          USERNAME: ${{ github.repository_owner }}
        run: |
          mkdir repos
          cd repos

          gh repo list $USERNAME --limit 100 --json name,isFork -q '.[] | select(.isFork==false) | .name' > repos.txt

          TOTAL=0
          TS=0
          JS=0
          PY=0

          while read repo; do
            git clone https://x-access-token:${GH_TOKEN}@github.com/${USERNAME}/${repo}.git
          done < repos.txt

          OUTPUT=$(cloc . --json)

          echo "$OUTPUT" > ../cloc-output.json

      - name: Update README
        run: |
          TOTAL=$(jq '.SUM.code' cloc-output.json)
          JS=$(jq '.JavaScript.code // 0' cloc-output.json)
          TS=$(jq '."TypeScript".code // 0' cloc-output.json)
          PY=$(jq '.Python.code // 0' cloc-output.json)
      
          awk '
          /<!-- LANGUAGES BREAKDOWN START -->/ {
            print
            print ""
            print "```text"
            print "📊 CODE STATS"
            print "-------------------------"
            print "TypeScript   → '"$TS"'"
            print "JavaScript   → '"$JS"'"
            print "Python       → '"$PY"'"
            print "-------------------------"
            print "Total LOC    → '"$TOTAL"'"
            print "```"
            skip=1
            next
          }
          /<!-- LANGUAGES BREAKDOWN END -->/ {
            skip=0
            print
            next
          }
          !skip
          ' README.md > temp && mv temp README.md

      - name: Commit changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add README.md
          git commit -m "update code stats" || echo "No changes"
          git push
